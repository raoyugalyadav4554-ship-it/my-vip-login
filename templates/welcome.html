<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f7fe; margin: 0; padding-top: 50px; }
        .illustration { width: 300px; margin-bottom: 30px; border-radius: 20px; }
        .btn-container { display: flex; justify-content: center; gap: 20px; padding: 20px; position: fixed; bottom: 50px; width: 100%; }
        .btn { padding: 15px 40px; border-radius: 12px; font-weight: bold; cursor: pointer; text-decoration: none; width: 120px; display: inline-block; }
        .register-btn { background: white; color: #1a0b47; border: 2px solid #1a0b47; }
        .login-btn { background: #1a0b47; color: white; border: none; }
    </style>
</head>
<body>
    <img src="https://img.freepik.com/free-vector/mobile-login-concept-illustration_114360-83.jpg" class="illustration">
    <h2>Welcome to VIP System</h2>
    <p style="color: #666;">Secure terminal for authorized operators only.</p>
    <div class="btn-container">
        <a href="/signup" class="btn register-btn">Register</a>
        <a href="/login_page" class="btn login-btn">Login</a>
    </div>
</body>
</html>
