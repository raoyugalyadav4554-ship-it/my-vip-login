<!DOCTYPE html>
<html>
<head>
    <title>VIP Login</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding-top: 100px; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 15px; display: inline-block; width: 300px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 95%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        a { color: #ff4b2b; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2>VIP Login</h2>
        <form action="/login" method="POST">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p>Naya account? <a href="/signup_page">Register Karein</a></p>
    </div>
</body>
</html>
