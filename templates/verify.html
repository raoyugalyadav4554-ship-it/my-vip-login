<!DOCTYPE html>
<html>
<body style="background:#1a1a1a;color:white;text-align:center;padding-top:100px;font-family:sans-serif;">
    <div style="display:inline-block;background:#333;padding:30px;border-radius:10px;">
        <h2>OTP Verification</h2>
        <p>Aapke email par code bheja gaya hai.</p>
        <form action="/verify" method="POST">
            <input type="text" name="otp" placeholder="Enter OTP" required style="padding:10px;border-radius:5px;border:none;">
            <br><br>
            <button type="submit" style="padding:10px 20px;background:#ff4b2b;color:white;border:none;border-radius:5px;cursor:pointer;">Verify Account</button>
        </form>
    </div>
</body>
</html>
