<!DOCTYPE html>
<html>
<body style="background:#121212;color:white;text-align:center;padding-top:100px;font-family:sans-serif;">
    <div style="background:#1e1e1e;padding:40px;border-radius:12px;display:inline-block;">
        <h2>Verify OTP</h2>
        <p>Enter the 6-digit code sent to your email.</p>
        <form action="/verify" method="POST">
            <input type="text" name="otp" placeholder="000000" required style="padding:10px;text-align:center;">
            <br><br>
            <button type="submit" style="padding:10px 20px;background:#007bff;color:white;border:none;border-radius:5px;">Verify Now</button>
        </form>
    </div>
</body>
</html>
