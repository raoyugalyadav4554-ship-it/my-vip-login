<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding-top: 100px; }
        .card { background: #1e1e1e; padding: 40px; border-radius: 12px; display: inline-block; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { padding: 12px; width: 80%; margin: 20px 0; border-radius: 6px; border: 1px solid #333; background: #252525; color: white; font-size: 18px; text-align: center; }
        button { padding: 12px 30px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 88%; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Enter OTP</h2>
        <p>A 6-digit code has been sent to your email.</p>
        <form action="/verify" method="POST">
            <input type="text" name="otp" placeholder="000000" required maxlength="6">
            <br>
            <button type="submit">Verify Account</button>
        </form>
    </div>
</body>
</html>
